apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    nginx.ingress.kubernetes.io/use-regex: 'true'
spec:
  ingressClassName: nginx
  rules:
    - host: tickethub.dev
      http:
        paths:
          - path: /api/users/me
            pathType: Prefix
            backend:
              service:
                name: auth-srv
                port:
                  number: 5000
